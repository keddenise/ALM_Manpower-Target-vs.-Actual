<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ALM Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --blue:#1d4ed8; --blue2:#3b82f6; --blue-bg:#eff6ff; --blue-bd:#bfdbfe;
  --green:#15803d; --green2:#22c55e; --green-bg:#f0fdf4; --green-bd:#bbf7d0;
  --orange:#c2410c; --orange2:#f97316; --orange-bg:#fff7ed; --orange-bd:#fed7aa;
  --red:#b91c1c; --red-bg:#fef2f2; --red-bd:#fecaca;
  --gray50:#f8fafc; --gray100:#f1f5f9; --gray200:#e2e8f0;
  --gray300:#cbd5e1; --gray500:#64748b; --gray700:#334155; --gray900:#0f172a;
  --white:#ffffff;
  --shadow-sm:0 1px 2px rgba(0,0,0,.05);
  --shadow:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);
  --shadow-md:0 4px 6px rgba(0,0,0,.07),0 2px 4px rgba(0,0,0,.06);
  --shadow-lg:0 10px 15px rgba(0,0,0,.08),0 4px 6px rgba(0,0,0,.05);
  --radius:12px; --radius-sm:8px;
  --font:'Plus Jakarta Sans',system-ui,sans-serif;
}
body{font-family:var(--font);background:var(--gray100);color:var(--gray900);font-size:14px;min-height:100vh;}

/* ── TOP NAV ── */
.nav{
  background:var(--white);border-bottom:1px solid var(--gray200);
  padding:0 28px;display:flex;align-items:center;
  justify-content:space-between;height:60px;
  position:sticky;top:0;z-index:100;
  box-shadow:var(--shadow-sm);
}
.nav-brand{display:flex;align-items:center;gap:10px;}
.nav-logo{
  width:34px;height:34px;background:var(--blue);border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:800;color:#fff;letter-spacing:-.5px;
}
.nav-title{font-size:15px;font-weight:700;color:var(--gray900);}
.nav-sub{font-size:11px;color:var(--gray500);margin-top:1px;}

.nav-right{display:flex;align-items:center;gap:8px;}
.nav-select{
  border:1.5px solid var(--gray200);border-radius:var(--radius-sm);
  padding:6px 10px;font-size:13px;font-weight:600;
  color:var(--gray700);background:var(--gray50);
  cursor:pointer;outline:none;font-family:var(--font);
  transition:border-color .15s;
}
.nav-select:hover{border-color:var(--blue2);}
.nav-clock{
  background:var(--blue-bg);border:1.5px solid var(--blue-bd);
  color:var(--blue);font-size:12px;font-weight:700;
  padding:6px 12px;border-radius:var(--radius-sm);
  min-width:90px;text-align:center;font-variant-numeric:tabular-nums;
}
.nav-btn{
  background:var(--blue);color:#fff;border:none;
  border-radius:var(--radius-sm);padding:7px 14px;
  font-size:12.5px;font-weight:700;cursor:pointer;
  font-family:var(--font);transition:background .15s;
  display:flex;align-items:center;gap:5px;
}
.nav-btn:hover{background:var(--blue2);}
.nav-btn:disabled{opacity:.5;cursor:default;}

/* ── LAYOUT ── */
.wrap{max-width:1200px;margin:0 auto;padding:24px 28px;}

/* ── STATUS ── */
.status{
  display:flex;align-items:center;gap:7px;
  padding:10px 14px;border-radius:var(--radius-sm);
  margin-bottom:20px;font-size:12.5px;font-weight:500;
  border:1.5px solid var(--gray200);background:var(--white);color:var(--gray500);
}
.status.loading{color:var(--orange);border-color:var(--orange-bd);background:var(--orange-bg);}
.status.error  {color:var(--red);  border-color:var(--red-bd);  background:var(--red-bg);}
.status.ok     {color:var(--green);border-color:var(--green-bd);background:var(--green-bg);}
.spin{width:12px;height:12px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── PERIOD HEADER ── */
.period-head{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:20px;
}
.period-title{font-size:22px;font-weight:800;color:var(--gray900);}
.period-sub{font-size:13px;color:var(--gray500);margin-top:3px;}
.period-badge{
  background:var(--blue-bg);border:1.5px solid var(--blue-bd);
  color:var(--blue);font-size:12px;font-weight:700;
  padding:4px 12px;border-radius:999px;
}

/* ── KPI CARDS GRID ── */
.kpi-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
  margin-bottom:8px;
}
@media(max-width:900px){.kpi-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:500px){.kpi-grid{grid-template-columns:1fr;}}

.kpi{
  background:var(--white);
  border:2px solid var(--gray200);
  border-radius:var(--radius);
  padding:20px;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  transition:all .2s ease;
  user-select:none;
}
.kpi:hover{border-color:var(--blue2);box-shadow:var(--shadow-md);transform:translateY(-2px);}
.kpi.active{border-color:var(--blue);box-shadow:0 0 0 3px rgba(29,78,216,.12),var(--shadow-md);}
.kpi.active.green-kpi{border-color:var(--green);box-shadow:0 0 0 3px rgba(21,128,61,.1),var(--shadow-md);}
.kpi.active.orange-kpi{border-color:var(--orange);box-shadow:0 0 0 3px rgba(194,65,12,.1),var(--shadow-md);}
.kpi.active.red-kpi{border-color:var(--red);box-shadow:0 0 0 3px rgba(185,28,28,.1),var(--shadow-md);}

/* color dot */
.kpi-dot{width:8px;height:8px;border-radius:50%;margin-bottom:14px;flex-shrink:0;}
.blue-kpi   .kpi-dot{background:var(--blue);}
.green-kpi  .kpi-dot{background:var(--green2);}
.orange-kpi .kpi-dot{background:var(--orange2);}
.red-kpi    .kpi-dot{background:var(--red);}

.kpi-label{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--gray500);margin-bottom:8px;}
.kpi-value{font-size:26px;font-weight:800;color:var(--gray900);line-height:1;letter-spacing:-1px;margin-bottom:6px;}
.kpi-meta{font-size:11.5px;color:var(--gray500);}
.kpi-change{
  display:inline-flex;align-items:center;gap:3px;
  font-size:11px;font-weight:700;
  padding:2px 7px;border-radius:999px;
  margin-top:10px;
}
.ch-up  {background:var(--green-bg); color:var(--green);}
.ch-down{background:var(--red-bg);   color:var(--red);}
.ch-flat{background:var(--blue-bg);  color:var(--blue);}

/* Drill arrow */
.kpi-arrow{
  position:absolute;bottom:16px;right:16px;
  width:24px;height:24px;border-radius:50%;
  background:var(--gray100);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;color:var(--gray500);
  transition:all .2s;
}
.kpi:hover .kpi-arrow,.kpi.active .kpi-arrow{background:var(--blue);color:#fff;}
.kpi.active.green-kpi  .kpi-arrow{background:var(--green);}
.kpi.active.orange-kpi .kpi-arrow{background:var(--orange);}
.kpi.active.red-kpi    .kpi-arrow{background:var(--red);}

/* Progress bar inside KPI */
.kpi-bar{margin-top:10px;}
.kpi-bar-track{height:3px;background:var(--gray200);border-radius:99px;overflow:hidden;}
.kpi-bar-fill{height:100%;border-radius:99px;transition:width .8s ease;}
.blue-kpi   .kpi-bar-fill{background:var(--blue);}
.green-kpi  .kpi-bar-fill{background:var(--green2);}
.orange-kpi .kpi-bar-fill{background:var(--orange2);}
.red-kpi    .kpi-bar-fill{background:var(--red);}

/* ── DRILL DOWN PANEL ── */
.drill-panel{
  background:var(--white);
  border:2px solid var(--blue);
  border-radius:var(--radius);
  overflow:hidden;
  margin-top:12px;
  margin-bottom:20px;
  box-shadow:var(--shadow-lg);
  animation:slideDown .25s ease;
}
.drill-panel.green-panel {border-color:var(--green);}
.drill-panel.orange-panel{border-color:var(--orange);}
.drill-panel.red-panel   {border-color:var(--red);}

@keyframes slideDown{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);}}

.drill-header{
  padding:16px 22px;
  background:var(--blue-bg);
  border-bottom:1px solid var(--blue-bd);
  display:flex;align-items:center;justify-content:space-between;
}
.green-panel  .drill-header{background:var(--green-bg); border-bottom-color:var(--green-bd);}
.orange-panel .drill-header{background:var(--orange-bg);border-bottom-color:var(--orange-bd);}
.red-panel    .drill-header{background:var(--red-bg);   border-bottom-color:var(--red-bd);}

.drill-header-left h3{font-size:14px;font-weight:700;color:var(--gray900);}
.drill-header-left p{font-size:11.5px;color:var(--gray500);margin-top:2px;}
.drill-close{
  width:28px;height:28px;border-radius:50%;border:none;cursor:pointer;
  background:rgba(0,0,0,.08);color:var(--gray700);
  display:flex;align-items:center;justify-content:center;font-size:14px;
  transition:background .15s;font-family:var(--font);
}
.drill-close:hover{background:rgba(0,0,0,.15);}

.drill-body{padding:22px;}

/* Drill tabs */
.drill-tabs{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap;}
.dtab{
  padding:6px 14px;border-radius:999px;font-size:12px;font-weight:600;
  cursor:pointer;border:1.5px solid var(--gray200);
  background:var(--white);color:var(--gray500);
  transition:all .15s;font-family:var(--font);
}
.dtab:hover{border-color:var(--gray300);color:var(--gray700);}
.dtab.active{background:var(--blue);border-color:var(--blue);color:#fff;}
.green-panel  .dtab.active{background:var(--green); border-color:var(--green);}
.orange-panel .dtab.active{background:var(--orange);border-color:var(--orange);}
.red-panel    .dtab.active{background:var(--red);   border-color:var(--red);}

/* Drill stats row */
.drill-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:20px;}
.dstat{background:var(--gray50);border:1px solid var(--gray200);border-radius:var(--radius-sm);padding:14px 16px;}
.dstat-val{font-size:20px;font-weight:800;color:var(--gray900);letter-spacing:-.5px;}
.dstat-lbl{font-size:10.5px;color:var(--gray500);margin-top:3px;text-transform:uppercase;letter-spacing:.07em;font-weight:600;}

/* Chart container */
.drill-chart{position:relative;height:280px;}

/* Company table inside drill */
.co-table{width:100%;border-collapse:collapse;font-size:12.5px;}
.co-table thead th{
  padding:9px 12px;background:var(--gray50);
  font-size:10px;text-transform:uppercase;letter-spacing:.07em;
  color:var(--gray500);font-weight:700;text-align:left;
  border-bottom:1.5px solid var(--gray200);
}
.co-table thead th:not(:first-child){text-align:right;}
.co-table tbody td{padding:10px 12px;border-bottom:1px solid var(--gray200);color:var(--gray700);}
.co-table tbody td:not(:first-child){text-align:right;font-variant-numeric:tabular-nums;}
.co-table tbody tr:last-child td{border-bottom:none;}
.co-table tbody tr:hover td{background:var(--blue-bg);}
.co-table .total td{background:var(--blue-bg)!important;font-weight:700;color:var(--gray900);border-top:2px solid var(--blue-bd);}

.pill{display:inline-flex;padding:2px 7px;border-radius:999px;font-size:10.5px;font-weight:700;}
.pg{background:var(--green-bg);color:var(--green);}
.po{background:var(--orange-bg);color:var(--orange);}
.pr{background:var(--red-bg);color:var(--red);}

.vp{color:var(--green);font-weight:700;}
.vn{color:var(--red);font-weight:700;}

/* ── BOTTOM ROW — trend + donut ── */
.bottom-row{display:grid;grid-template-columns:1fr 320px;gap:12px;margin-top:12px;}
@media(max-width:900px){.bottom-row{grid-template-columns:1fr;}}

.card{background:var(--white);border:1.5px solid var(--gray200);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow-sm);}
.card-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;}
.card-head-l h3{font-size:13.5px;font-weight:700;color:var(--gray900);}
.card-head-l p{font-size:11px;color:var(--gray500);margin-top:2px;}
.card-badge{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:999px;background:var(--blue-bg);color:var(--blue);}
.card-badge.g{background:var(--green-bg);color:var(--green);}

.chart-area{position:relative;height:220px;}

/* Donut panel */
.donut-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;height:220px;position:relative;}
.donut-center{position:absolute;text-align:center;pointer-events:none;}
.donut-pct{font-size:26px;font-weight:900;color:var(--gray900);}
.donut-sub{font-size:10px;color:var(--gray500);margin-top:2px;}
.donut-legend{margin-top:14px;width:100%;}
.dl-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--gray100);}
.dl-row:last-child{border-bottom:none;}
.dl-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-right:6px;}
.dl-name{flex:1;font-size:11.5px;color:var(--gray700);}
.dl-val{font-size:12px;font-weight:700;color:var(--gray900);}
</style>
</head>
<body>

<!-- ═══ NAV ═══ -->
<nav class="nav">
  <div class="nav-brand">
    <div class="nav-logo">ALM</div>
    <div>
      <div class="nav-title">ALM Manpower Dashboard</div>
      <div class="nav-sub">Management Service Corp.</div>
    </div>
  </div>
  <div class="nav-right">
    <select class="nav-select" id="selYear" onchange="onYearChange()"></select>
    <select class="nav-select" id="selMonth" onchange="loadData()">
      <option value="0">Full Year</option>
      <option value="1">January</option><option value="2">February</option>
      <option value="3">March</option><option value="4">April</option>
      <option value="5">May</option><option value="6">June</option>
      <option value="7">July</option><option value="8">August</option>
      <option value="9">September</option><option value="10">October</option>
      <option value="11">November</option><option value="12">December</option>
    </select>
    <div class="nav-clock" id="clockEl">--:--:--</div>
    <button class="nav-btn" id="btnRefresh" onclick="loadData()">↻ Refresh</button>
  </div>
</nav>

<!-- ═══ CONTENT ═══ -->
<div class="wrap">

  <div class="status loading" id="statusEl">
    <span class="spin"></span>&nbsp; Loading data…
  </div>

  <!-- Period heading -->
  <div class="period-head" id="periodHead" style="display:none">
    <div>
      <div class="period-title" id="periodTitle">–</div>
      <div class="period-sub">Click any card below to drill down</div>
    </div>
    <div class="period-badge" id="periodBadge">–</div>
  </div>

  <!-- KPI Cards -->
  <div class="kpi-grid" id="kpiGrid"></div>

  <!-- Drill-down panel (shown on click) -->
  <div id="drillPanel" style="display:none"></div>

  <!-- Bottom: Trend + Donut -->
  <div class="bottom-row" id="bottomRow" style="display:none">
    <div class="card">
      <div class="card-head">
        <div class="card-head-l">
          <h3>12-Month Trend</h3>
          <p>Headcount · Gross Profit · Net Income</p>
        </div>
        <span class="card-badge" id="trendBadge">Full Year</span>
      </div>
      <div class="chart-area"><canvas id="chartTrend"></canvas></div>
    </div>
    <div class="card">
      <div class="card-head">
        <div class="card-head-l">
          <h3>Revenue Achievement</h3>
          <p>Actual vs target breakdown</p>
        </div>
        <span class="card-badge g" id="donutBadge">–</span>
      </div>
      <div class="donut-wrap">
        <div style="position:relative;width:160px;height:160px;">
          <canvas id="chartDonut" width="160" height="160"></canvas>
          <div class="donut-center" style="top:50%;left:50%;transform:translate(-50%,-50%)">
            <div class="donut-pct" id="donutPct">–%</div>
            <div class="donut-sub">achieved</div>
          </div>
        </div>
        <div class="donut-legend" id="donutLegend"></div>
      </div>
    </div>
  </div>

</div><!-- /wrap -->

<script>
/* ══════════════════════════════════════
   Config
══════════════════════════════════════ */
var URL = 'https://script.google.com/macros/s/AKfycbykeK12AYlns_LFSYzi-H6_s5leM21_nFOdENaCHCWKCv-8JH30aceAeyNJlRuBqdU/exec';

var CHARTS = {};
var DATA   = null;
var ACTIVE_KPI = null; // which card is open
var ACTIVE_TAB = {};   // tab per card

var C = {
  blue:'#1d4ed8', blue2:'#3b82f6', bluePale:'rgba(59,130,246,.1)',
  green:'#15803d', green2:'#22c55e', greenPale:'rgba(34,197,94,.1)',
  orange:'#c2410c', orange2:'#f97316', orangePale:'rgba(249,115,22,.1)',
  red:'#b91c1c', red2:'#ef4444', redPale:'rgba(239,68,68,.1)',
  gray:'#94a3b8', border:'#e2e8f0', text:'#0f172a', muted:'#64748b',
};

/* ══════════════════════════════════════
   Boot
══════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', function() {
  setInterval(function(){
    document.getElementById('clockEl').textContent =
      new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  }, 1000);

  var sel = document.getElementById('selYear');
  for (var y = 2025; y <= 2030; y++) {
    var o = document.createElement('option'); o.value=y; o.textContent=y; sel.appendChild(o);
  }
  var cy = Math.min(Math.max(new Date().getFullYear(),2025),2030);
  sel.value = cy;
  document.getElementById('selMonth').value = new Date().getMonth()+1;
  loadData();
});

function onYearChange() { loadData(); }

/* ══════════════════════════════════════
   Load
══════════════════════════════════════ */
function loadData() {
  var year  = parseInt(document.getElementById('selYear').value);
  var month = parseInt(document.getElementById('selMonth').value);
  setStatus('loading','Loading '+year+' · '+mLabel(month)+'…');
  document.getElementById('btnRefresh').disabled = true;

  var cbName = 'cb_' + Date.now();
  var s = document.createElement('script');
  window[cbName] = function(d) {
    delete window[cbName];
    try { document.body.removeChild(s); } catch(e) {}
    document.getElementById('btnRefresh').disabled = false;
    if (d.error) { setStatus('error','⚠ '+d.error); return; }
    DATA = d;
    ACTIVE_KPI = null;
    render(d);
    setStatus('ok','✔ '+d.year+' · '+d.monthName+' · '+new Date().toLocaleTimeString());
  };
  s.onerror = function() {
    try { document.body.removeChild(s); } catch(e) {}
    document.getElementById('btnRefresh').disabled = false;
    setStatus('error','⚠ Failed to load — check deployment or access settings.');
  };
  s.src = URL+'?year='+year+'&month='+month+'&callback='+cbName;
  document.body.appendChild(s);
}

/* ══════════════════════════════════════
   Render
══════════════════════════════════════ */
function render(d) {
  // period heading
  var ph = document.getElementById('periodHead');
  ph.style.display = 'flex';
  document.getElementById('periodTitle').textContent = 'FY '+d.year+' — '+d.monthName;
  document.getElementById('periodBadge').textContent = d.monthName;
  document.getElementById('trendBadge').textContent  = d.year;
  document.getElementById('donutBadge').textContent  = d.monthName;

  renderKpis(d);
  renderTrend(d);
  renderDonut(d);

  document.getElementById('bottomRow').style.display = 'grid';
  document.getElementById('drillPanel').style.display = 'none';
}

/* ══════════════════════════════════════
   KPI Cards
══════════════════════════════════════ */
function renderKpis(d) {
  var hcVar  = d.hc.totals.actualHC  - d.hc.totals.targetHC;
  var hcPct  = d.hc.totals.targetHC  > 0 ? Math.round(d.hc.totals.actualHC/d.hc.totals.targetHC*100) : 0;
  var revPct = d.ae.revenueAchievement;
  var netPos = d.ae.netIncome >= 0;

  var cards = [
    {
      id:'hc', cls:'blue-kpi',
      label:'Total Headcount',
      value: fmt(d.hc.totals.actualHC,0),
      meta: 'Target: '+fmt(d.hc.totals.targetHC,0),
      change: (hcVar>=0?'▲ +':'▼ ')+fmt(hcVar,1)+' vs target',
      chCls: hcVar>=0?'ch-up':'ch-down',
      barPct: Math.min(hcPct,100),
      icon:'👥'
    },
    {
      id:'wd', cls:'green-kpi',
      label:'Working Days',
      value: fmt(d.hc.totals.actualWD,1),
      meta: 'Target: '+fmt(d.hc.totals.targetWD,0)+' days',
      change: fmt(d.hc.totals.grossProfit>0?d.hc.totals.grossProfit:0,0)+' GP',
      chCls: 'ch-flat',
      barPct: d.hc.totals.targetWD>0?Math.min(Math.round(d.hc.totals.actualWD/d.hc.totals.targetWD*100),100):0,
      icon:'📅'
    },
    {
      id:'rev', cls:'orange-kpi',
      label:'Total Revenue',
      value: '₱'+fmtM(d.ae.actualRevenue),
      meta: 'Target: ₱'+fmtM(d.ae.targetRevenue),
      change: revPct+'% achieved',
      chCls: revPct>=100?'ch-up':revPct>=75?'ch-flat':'ch-down',
      barPct: Math.min(revPct,100),
      icon:'💼'
    },
    {
      id:'net', cls: netPos?'green-kpi':'red-kpi',
      label:'Net Income',
      value: (netPos?'':'−')+'₱'+fmtM(Math.abs(d.ae.netIncome)),
      meta: 'Gross Profit: ₱'+fmtM(d.ae.grossProfit),
      change: netPos?'▲ Profitable':'▼ Net Loss',
      chCls: netPos?'ch-up':'ch-down',
      barPct: d.ae.actualRevenue>0?Math.min(Math.round(Math.abs(d.ae.netIncome)/d.ae.actualRevenue*100),100):0,
      icon: netPos?'📈':'📉'
    }
  ];

  document.getElementById('kpiGrid').innerHTML = cards.map(function(c) {
    return '<div class="kpi '+c.cls+'" onclick="toggleDrill(\''+c.id+'\')" id="kpi-'+c.id+'">' +
      '<div style="display:flex;align-items:center;justify-content:space-between">' +
        '<div class="kpi-dot"></div>' +
        '<span style="font-size:18px">'+c.icon+'</span>' +
      '</div>' +
      '<div class="kpi-label">'+c.label+'</div>' +
      '<div class="kpi-value">'+c.value+'</div>' +
      '<div class="kpi-meta">'+c.meta+'</div>' +
      '<span class="kpi-change '+c.chCls+'">'+c.change+'</span>' +
      '<div class="kpi-bar"><div class="kpi-bar-track"><div class="kpi-bar-fill" style="width:'+c.barPct+'%"></div></div></div>' +
      '<div class="kpi-arrow">▾</div>' +
    '</div>';
  }).join('');
}

/* ══════════════════════════════════════
   Drill-down
══════════════════════════════════════ */
function toggleDrill(id) {
  if (ACTIVE_KPI === id) {
    // Close
    ACTIVE_KPI = null;
    document.querySelectorAll('.kpi').forEach(function(el){el.classList.remove('active');});
    document.getElementById('drillPanel').style.display = 'none';
    return;
  }
  ACTIVE_KPI = id;
  document.querySelectorAll('.kpi').forEach(function(el){el.classList.remove('active');});
  var kpiEl = document.getElementById('kpi-'+id);
  if (kpiEl) kpiEl.classList.add('active');
  openDrill(id);
}

function openDrill(id) {
  if (!DATA) return;
  var panel = document.getElementById('drillPanel');
  panel.style.display = 'block';

  var configs = {
    hc:  { title:'Headcount Details', sub:'Per company breakdown', cls:'', color:C.blue },
    wd:  { title:'Working Days Details', sub:'Target vs actual per company', cls:'green-panel', color:C.green },
    rev: { title:'Financial Details', sub:'Revenue & gross profit analysis', cls:'orange-panel', color:C.orange },
    net: { title:'Net Income Details', sub:'Income & expense breakdown', cls: DATA.ae.netIncome>=0?'green-panel':'red-panel', color: DATA.ae.netIncome>=0?C.green:C.red }
  };
  var cfg = configs[id];

  // Default tab
  if (!ACTIVE_TAB[id]) ACTIVE_TAB[id] = 'chart';

  var tabs = {
    hc:  [{k:'chart',l:'📊 Chart'},{k:'table',l:'📋 Table'}],
    wd:  [{k:'chart',l:'📊 Chart'},{k:'table',l:'📋 Table'}],
    rev: [{k:'chart',l:'📊 Chart'},{k:'trend',l:'📈 Trend'},{k:'table',l:'📋 Table'}],
    net: [{k:'chart',l:'📊 Chart'},{k:'table',l:'📋 Table'}]
  };

  var tabHtml = (tabs[id]||[]).map(function(t){
    return '<button class="dtab'+(ACTIVE_TAB[id]===t.k?' active':'')+'" onclick="setTab(\''+id+'\',\''+t.k+'\')">'+t.l+'</button>';
  }).join('');

  var statsHtml = buildDrillStats(id);
  var contentHtml = buildDrillContent(id, ACTIVE_TAB[id]);

  panel.className = 'drill-panel '+cfg.cls;
  panel.innerHTML =
    '<div class="drill-header">' +
      '<div class="drill-header-left"><h3>'+cfg.title+'</h3><p>'+cfg.sub+' · '+DATA.monthName+' '+DATA.year+'</p></div>' +
      '<button class="drill-close" onclick="toggleDrill(\''+id+'\')">✕</button>' +
    '</div>' +
    '<div class="drill-body">' +
      '<div class="drill-stats">'+statsHtml+'</div>' +
      '<div class="drill-tabs">'+tabHtml+'</div>' +
      '<div id="drillContent">'+contentHtml+'</div>' +
    '</div>';

  // init charts after DOM
  setTimeout(function(){ initDrillChart(id, ACTIVE_TAB[id]); }, 50);

  // scroll into view
  setTimeout(function(){ panel.scrollIntoView({behavior:'smooth', block:'nearest'}); }, 100);
}

function setTab(id, tab) {
  ACTIVE_TAB[id] = tab;
  openDrill(id);
}

/* ── Drill Stats row ── */
function buildDrillStats(id) {
  var d = DATA;
  var stats = {
    hc: [
      {v:fmt(d.hc.totals.targetHC,0), l:'Target HC'},
      {v:fmt(d.hc.totals.actualHC,1), l:'Actual HC'},
      {v:(d.hc.totals.actualHC-d.hc.totals.targetHC>=0?'+':'')+fmt(d.hc.totals.actualHC-d.hc.totals.targetHC,1), l:'Variance'},
      {v:(d.hc.totals.targetHC>0?Math.round(d.hc.totals.actualHC/d.hc.totals.targetHC*100):0)+'%', l:'Achievement'}
    ],
    wd: [
      {v:fmt(d.hc.totals.targetWD,0),    l:'Target WD'},
      {v:fmt(d.hc.totals.actualWD,2),    l:'Actual WD'},
      {v:'₱'+fmtM(d.hc.totals.grossProfit), l:'Gross Profit'},
      {v:d.companies.length+' co.',       l:'Companies'}
    ],
    rev: [
      {v:'₱'+fmtM(d.ae.targetRevenue),  l:'Target Revenue'},
      {v:'₱'+fmtM(d.ae.actualRevenue),  l:'Actual Revenue'},
      {v:'₱'+fmtM(d.ae.grossProfit),    l:'Gross Profit'},
      {v:d.ae.revenueAchievement+'%',   l:'Achievement'}
    ],
    net: [
      {v:'₱'+fmtM(d.ae.actualRevenue),                         l:'Revenue'},
      {v:'₱'+fmtM(d.ae.grossProfit),                           l:'Gross Profit'},
      {v:(d.ae.netIncome>=0?'':'−')+'₱'+fmtM(Math.abs(d.ae.netIncome)), l:'Net Income'},
      {v:(d.ae.actualRevenue>0?Math.round(d.ae.netIncome/d.ae.actualRevenue*100):0)+'%', l:'Net Margin'}
    ]
  };
  return (stats[id]||[]).map(function(s){
    return '<div class="dstat"><div class="dstat-val">'+s.v+'</div><div class="dstat-lbl">'+s.l+'</div></div>';
  }).join('');
}

/* ── Drill Content ── */
function buildDrillContent(id, tab) {
  if (tab === 'table') return buildDrillTable(id);
  if (tab === 'trend') return '<div class="drill-chart"><canvas id="drillCanvas"></canvas></div>';
  return '<div class="drill-chart"><canvas id="drillCanvas"></canvas></div>';
}

function buildDrillTable(id) {
  var d = DATA;
  if (id === 'hc' || id === 'wd') {
    var rows = d.companies.map(function(name,i){
      var t=d.hc.targetHC[i], a=d.hc.actualHC[i], v=a-t;
      var pct=t>0?Math.round(a/t*100):0;
      var pc=pct>=100?'pg':pct>=75?'po':'pr';
      return '<tr>' +
        '<td>'+sn(name)+'</td>'+
        '<td>'+fmt(t,0)+'</td>'+
        '<td><strong>'+fmt(a,1)+'</strong></td>'+
        '<td class="'+(v>=0?'vp':'vn')+'">'+(v>=0?'+':'')+fmt(v,1)+'</td>'+
        '<td><span class="pill '+pc+'">'+pct+'%</span></td>'+
        '<td>'+fmt(d.hc.targetWD[i],0)+'</td>'+
        '<td>'+fmt(d.hc.actualWD[i],2)+'</td>'+
        '<td>₱'+fmtK(d.hc.grossProfit[i])+'</td>'+
        '</tr>';
    });
    var t=d.hc.totals, tv=t.actualHC-t.targetHC, tpct=t.targetHC>0?Math.round(t.actualHC/t.targetHC*100):0;
    rows.push('<tr class="total"><td><strong>TOTAL</strong></td>'+
      '<td>'+fmt(t.targetHC,0)+'</td><td><strong>'+fmt(t.actualHC,1)+'</strong></td>'+
      '<td class="'+(tv>=0?'vp':'vn')+'">'+(tv>=0?'+':'')+fmt(tv,1)+'</td>'+
      '<td><span class="pill '+(tpct>=100?'pg':tpct>=75?'po':'pr')+'">'+tpct+'%</span></td>'+
      '<td>'+fmt(t.targetWD,0)+'</td><td>'+fmt(t.actualWD,2)+'</td>'+
      '<td>₱'+fmtK(t.grossProfit)+'</td></tr>');
    return '<div style="overflow-x:auto"><table class="co-table"><thead><tr>'+
      '<th>Company</th><th>Target HC</th><th>Actual HC</th><th>Var</th><th>Ach%</th>'+
      '<th>Target WD</th><th>Actual WD</th><th>Gross Profit</th></tr></thead>'+
      '<tbody>'+rows.join('')+'</tbody></table></div>';
  }
  // financial table (rev / net)
  var frows = [
    ['Total Revenue','₱'+fmtK(DATA.ae.targetRevenue),'₱'+fmtK(DATA.ae.actualRevenue)],
    ['Gross Profit','–','₱'+fmtK(DATA.ae.grossProfit)],
    ['Net Income','–','₱'+fmtK(DATA.ae.netIncome)],
    ['Revenue Achievement','100%',DATA.ae.revenueAchievement+'%'],
  ];
  return '<div style="overflow-x:auto"><table class="co-table"><thead><tr><th>Item</th><th>Target</th><th>Actual</th></tr></thead><tbody>'+
    frows.map(function(r){ return '<tr><td>'+r[0]+'</td><td>'+r[1]+'</td><td><strong>'+r[2]+'</strong></td></tr>'; }).join('')+
    '</tbody></table></div>';
}

function initDrillChart(id, tab) {
  var d = DATA;
  var ctx = document.getElementById('drillCanvas');
  if (!ctx) return;
  if (CHARTS['drill']) { CHARTS['drill'].destroy(); delete CHARTS['drill']; }

  var labels, datasets, type='bar';

  if (id === 'hc') {
    labels = d.companies.map(sn);
    datasets = [
      {label:'Target HC', data:d.hc.targetHC, backgroundColor:C.blue+'bb', borderColor:C.blue, borderWidth:1.5, borderRadius:5},
      {label:'Actual HC', data:d.hc.actualHC, backgroundColor:C.green2+'bb', borderColor:C.green2, borderWidth:1.5, borderRadius:5}
    ];
  } else if (id === 'wd') {
    labels = d.companies.map(sn);
    datasets = [
      {label:'Target WD', data:d.hc.targetWD, backgroundColor:C.blue+'bb', borderColor:C.blue, borderWidth:1.5, borderRadius:5},
      {label:'Actual WD', data:d.hc.actualWD, backgroundColor:C.orange2+'bb', borderColor:C.orange2, borderWidth:1.5, borderRadius:5}
    ];
  } else if (id === 'rev') {
    if (tab === 'trend') {
      type = 'line'; labels = d.trend.months;
      datasets = [
        {label:'Revenue', data:d.trend.revenue, borderColor:C.orange2, backgroundColor:C.orangePale, fill:true, tension:.4, pointRadius:3},
        {label:'Gross Profit', data:d.trend.grossProfit, borderColor:C.green2, backgroundColor:C.greenPale, fill:true, tension:.4, pointRadius:3}
      ];
    } else {
      labels = ['Revenue'];
      datasets = [
        {label:'Target', data:[d.ae.targetRevenue], backgroundColor:C.blue+'bb', borderColor:C.blue, borderWidth:1.5, borderRadius:5},
        {label:'Actual', data:[d.ae.actualRevenue], backgroundColor:C.orange2+'bb', borderColor:C.orange2, borderWidth:1.5, borderRadius:5}
      ];
    }
  } else if (id === 'net') {
    type = 'line'; labels = d.trend.months;
    datasets = [{
      label:'Net Income', data:d.trend.netIncome,
      borderColor:C.blue2, backgroundColor:C.bluePale,
      fill:true, tension:.4, pointRadius:3,
      segment:{borderColor:function(ctx){return ctx.p0.parsed.y<0||ctx.p1.parsed.y<0?C.red:C.blue2;}}
    }];
  }

  var opts = {
    responsive:true, maintainAspectRatio:false,
    plugins:{
      legend:{labels:{color:C.text,font:{size:11},boxWidth:10,padding:12}},
      tooltip:{backgroundColor:'#fff',borderColor:C.border,borderWidth:1.5,titleColor:C.text,bodyColor:C.muted,padding:10,cornerRadius:8}
    },
    scales:{
      x:{ticks:{color:C.muted,font:{size:10},maxRotation:35},grid:{color:'#f1f5f9'}},
      y:{ticks:{color:C.muted,font:{size:10},callback:function(v){return id==='hc'||id==='wd'?v:'₱'+fmtK(v);}},grid:{color:'#f1f5f9'}}
    }
  };
  CHARTS['drill'] = new Chart(ctx.getContext('2d'), {type:type, data:{labels:labels,datasets:datasets}, options:opts});
}

/* ══════════════════════════════════════
   Trend Chart
══════════════════════════════════════ */
function renderTrend(d) {
  var opts = {
    responsive:true, maintainAspectRatio:false,
    plugins:{
      legend:{labels:{color:C.text,font:{size:11},boxWidth:10,padding:12}},
      tooltip:{backgroundColor:'#fff',borderColor:C.border,borderWidth:1.5,titleColor:C.text,bodyColor:C.muted,padding:10,cornerRadius:8}
    },
    scales:{
      x:{ticks:{color:C.muted,font:{size:10}},grid:{color:'#f1f5f9'}},
      y:{position:'left',ticks:{color:C.blue,font:{size:10}},grid:{color:'#f1f5f9'},title:{display:true,text:'HC',color:C.muted,font:{size:10}}},
      y1:{position:'right',ticks:{color:C.green,font:{size:10},callback:function(v){return '₱'+fmtK(v);}},grid:{drawOnChartArea:false}}
    }
  };
  if (CHARTS.trend) { CHARTS.trend.destroy(); }
  CHARTS.trend = new Chart(document.getElementById('chartTrend').getContext('2d'), {
    type:'line',
    data:{labels:d.trend.months,datasets:[
      {label:'Actual HC', data:d.trend.totalActualHC, borderColor:C.blue, backgroundColor:C.bluePale, fill:true, tension:.4, pointRadius:3, yAxisID:'y'},
      {label:'Gross Profit', data:d.trend.totalGrossProfit, borderColor:C.green2, backgroundColor:C.greenPale, fill:false, tension:.4, pointRadius:3, borderDash:[5,3], yAxisID:'y1'},
      {label:'Net Income', data:d.trend.netIncome, borderColor:C.orange2, backgroundColor:'transparent', fill:false, tension:.4, pointRadius:3, borderDash:[3,3], yAxisID:'y1'}
    ]},
    options:opts
  });
}

/* ══════════════════════════════════════
   Donut
══════════════════════════════════════ */
function renderDonut(d) {
  var pct = d.ae.revenueAchievement;
  var rem = Math.max(0, 100-pct);
  var fc  = pct>=100?C.green2:pct>=75?C.orange2:C.red;
  document.getElementById('donutPct').textContent = pct+'%';
  document.getElementById('donutPct').style.color  = fc;

  if (CHARTS.donut) CHARTS.donut.destroy();
  CHARTS.donut = new Chart(document.getElementById('chartDonut').getContext('2d'), {
    type:'doughnut',
    data:{labels:['Achieved','Remaining'],datasets:[{
      data:[Math.min(pct,100),rem],
      backgroundColor:[fc,'#e2e8f0'],
      borderColor:['white','white'],borderWidth:3
    }]},
    options:{responsive:false,cutout:'72%',plugins:{legend:{display:false},tooltip:{enabled:false}}}
  });

  document.getElementById('donutLegend').innerHTML = [
    {dot:fc,      name:'Revenue Achieved', val:'₱'+fmtM(d.ae.actualRevenue)},
    {dot:'#e2e8f0',name:'Remaining Target',  val:'₱'+fmtM(Math.max(0,d.ae.targetRevenue-d.ae.actualRevenue))},
    {dot:C.green2, name:'Gross Profit',       val:'₱'+fmtM(d.ae.grossProfit)},
  ].map(function(r){
    return '<div class="dl-row"><span class="dl-dot" style="background:'+r.dot+'"></span><span class="dl-name">'+r.name+'</span><span class="dl-val">'+r.val+'</span></div>';
  }).join('');
}

/* ══════════════════════════════════════
   Utilities
══════════════════════════════════════ */
function setStatus(t,m){
  var el=document.getElementById('statusEl');
  el.className='status '+t;
  el.innerHTML=(t==='loading'?'<span class="spin"></span>&nbsp; ':'')+m;
}
function mLabel(m){return['Full Year','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][m]||'';}
var SN={'Changhong Technology Phils., Inc.':'Changhong','Bocheng Rubber Phils., Inc.':'Bocheng Rubber','(SMT) Bocheng Electronics Tech. Phils., Inc.':'Bocheng SMT','Atlantic Grains, Inc.':'Atlantic Grains','Kongngai Metal Tooling & Stampling Corp.':'Kongngai','Voion Packaging Phils., Inc.':'Voion','Youngshinn Starlink Phils., Inc.':'Youngshinn','Advantek Incorporated':'Advantek','Naigai Gomu Phils., Corp.':'Naigai','Fort Wayne Wire Die Phils., Inc.':'Fort Wayne','POSCO-Phil. Manila Processing Center, Inc.':'POSCO','T.E. OptoElectronics Tech. Co. Phils. Inc.':'T.E. Opto','Paiteng':'Paiteng','Tanauan Medical Clinic':'TMC','ASTI':'ASTI'};
function sn(n){return SN[n]||n.substring(0,14);}
function fmt(n,d){if(n==null||isNaN(n))return'–';return Number(n).toLocaleString('en-PH',{minimumFractionDigits:d,maximumFractionDigits:d});}
function fmtK(n){if(!n||isNaN(n))return'0';return Number(n).toLocaleString('en-PH',{minimumFractionDigits:0,maximumFractionDigits:0});}
function fmtM(n){if(!n||isNaN(n))return'0';var a=Math.abs(n);if(a>=1000000)return(n/1000000).toFixed(2)+'M';if(a>=1000)return(n/1000).toFixed(1)+'K';return Number(n).toFixed(0);}
</script>
